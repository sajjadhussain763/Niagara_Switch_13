<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niagara NPB Switch - Professional Topology</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        @media print {
            body * { visibility: hidden; }
            #diagram-container, #diagram-container svg { visibility: visible; }
            #diagram-container { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
            .toolbar, header { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <main id="diagram-container">
            <svg id="network-svg" preserveAspectRatio="xMidYMid meet"></svg>
        </main>

        <div class="toolbar">
            <button id="download-png" class="btn-primary">Export 8K PNG</button>
            <button id="download-jpg" class="btn-secondary">Export 8K JPG</button>
            <button id="print-pdf" class="btn-outline">Save as PDF</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
